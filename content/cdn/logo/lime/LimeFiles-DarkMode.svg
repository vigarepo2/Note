<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="shadowLarge" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="shadowSmall" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="-2" dy="4" stdDeviation="4" flood-color="#000000" flood-opacity="0.3"/>
    </filter>

    <linearGradient id="folderBackGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#94A3B8"/>
      <stop offset="100%" stop-color="#475569"/>
    </linearGradient>

    <linearGradient id="docGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="foldGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>

    <linearGradient id="limeRindGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>

    <linearGradient id="limePulpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#84CC16"/>
    </linearGradient>

    <linearGradient id="arrowGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#84CC16"/>
      <stop offset="100%" stop-color="#22C55E"/>
    </linearGradient>

    <path id="limeWedge" 
          d="M 256 256 
             L 436.7 204.2 
             A 188 188 0 0 1 436.7 307.8 
             Z" 
          fill="url(#limePulpGrad)"/>
  </defs>

  <path d="M 64 256 
           L 64 120 C 64 100 80 84 100 84 
           L 200 84 C 215 84 228 92 236 104 
           L 256 136 
           L 412 136 C 432 136 448 152 448 172 
           L 448 256 
           Z" 
        fill="url(#folderBackGrad)" 
        filter="url(#shadowLarge)"/>

  <g filter="url(#shadowLarge)">
    <path d="M 104 256 
             L 104 100 C 104 90 112 82 122 82 
             L 340 82 
             L 408 150 
             L 408 256 
             Z" 
          fill="url(#docGrad)"/>
          
    <path d="M 340 82 
             L 340 142 C 340 146 344 150 348 150 
             L 408 150 
             Z" 
          fill="url(#foldGrad)" 
          filter="url(#shadowSmall)"/>
  </g>

  <g opacity="0.8">
    <rect x="136" y="112" width="100" height="8" rx="4" fill="#A3E635"/>
    <rect x="136" y="132" width="160" height="8" rx="4" fill="#334155"/>
    <rect x="136" y="152" width="130" height="8" rx="4" fill="#334155"/>
    <rect x="136" y="172" width="180" height="8" rx="4" fill="#334155"/>
  </g>

  <circle cx="340" cy="204" r="20" fill="#334155" filter="url(#shadowSmall)"/>
  <path d="M 340 192 L 348 202 L 343 202 L 343 216 L 337 216 L 337 202 L 332 202 Z" fill="url(#arrowGrad)"/>

  <g filter="url(#shadowLarge)">
    
    <path d="M 32 256 
             A 224 224 0 0 0 480 256 
             Z" 
          fill="url(#limeRindGrad)"/>

    <path d="M 48 256 
             A 208 208 0 0 0 464 256 
             Z" 
          fill="#FFFFFF"/>

    <use href="#limeWedge" transform="rotate(18 256 256)"/>
    <use href="#limeWedge" transform="rotate(54 256 256)"/>
    <use href="#limeWedge" transform="rotate(90 256 256)"/>
    <use href="#limeWedge" transform="rotate(126 256 256)"/>
    <use href="#limeWedge" transform="rotate(162 256 256)"/>

    <path d="M 224 256 
             A 32 32 0 0 0 288 256 
             Z" 
          fill="#FFFFFF"/>
          
    <path d="M 96 430 
             A 180 180 0 0 0 416 430" 
          fill="none" 
          stroke="#FFFFFF" 
          stroke-width="5" 
          stroke-linecap="round" 
          opacity="0.15"/>
  </g>

</svg>
