<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 600" width="100%" height="100%">
  <defs>
    <filter id="darkGlow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="0" stdDeviation="20" flood-color="#84CC16" flood-opacity="0.4"/>
      <feDropShadow dx="0" dy="8" stdDeviation="15" flood-color="#020617" flood-opacity="0.6"/>
    </filter>
    
    <filter id="innerVoidShadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="8" stdDeviation="12" flood-color="#000000" flood-opacity="0.5"/>
    </filter>

    <linearGradient id="cloudGradDark" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <linearGradient id="limePulpGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#84CC16"/>
    </linearGradient>

    <linearGradient id="limeRindGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="100%" stop-color="#15803D"/>
    </linearGradient>

    <path id="limeWedge" 
          d="M 400 370 
             L 485 345 
             A 90 90 0 0 1 485 395 
             Z" 
          fill="url(#limePulpGrad)"/>
  </defs>

  <path d="M 120 70 
           H 680 A 50 50 0 0 1 730 120 
           V 480 A 50 50 0 0 1 680 530 
           H 120 A 50 50 0 0 1 70 480 
           V 120 A 50 50 0 0 1 120 70 Z" 
        fill="none" 
        stroke="#E2E8F0" 
        stroke-width="6" 
        stroke-dasharray="16 12" 
        stroke-linecap="round"/>

  <g filter="darkGlow">
    <circle cx="400" cy="370" r="230" fill="none" stroke="#A3E635" stroke-width="4" stroke-dasharray="2 20"/>
    <circle cx="400" cy="370" r="200" fill="none" stroke="#38BDF8" stroke-width="4" stroke-dasharray="2 18"/>
    <circle cx="400" cy="370" r="170" fill="none" stroke="#BEF264" stroke-width="4" stroke-dasharray="2 16"/>
  
    <g fill="#BEF264" font-size="20">
      <path d="M 330 200 L 338 212 L 333 212 L 333 226 L 327 226 L 327 212 L 322 212 Z"/> <circle cx="470" cy="220" r="8"/> <path d="M 520 280 L 528 292 L 523 292 L 523 306 L 517 306 L 517 292 L 512 292 Z"/> </g>
  </g>

  <g filter="innerVoidShadow">
    <path d="M 300 370 
             C 240 370, 220 310, 270 290 
             C 250 220, 360 180, 410 230 
             C 460 200, 560 250, 520 310 
             C 570 340, 540 390, 480 390 
             L 400 390 
             L 320 390 
             C 300 390, 280 380, 280 370 
             C 280 360, 290 350, 300 350 Z" 
          fill="url(#cloudGradDark)"/>
    
    <circle cx="400" cy="370" r="14" fill="#FFFFFF"/>

    <use href="#limeWedge" transform="rotate(22.5 400 370)"/>
    <use href="#limeWedge" transform="rotate(67.5 400 370)"/>
    <use href="#limeWedge" transform="rotate(112.5 400 370)"/>
    <use href="#limeWedge" transform="rotate(157.5 400 370)"/>
  </g>

  <path d="M 400 170 L 420 195 L 406 195 L 406 240 L 394 240 L 394 195 L 380 195 Z" fill="#BEF264"/>

</svg>
