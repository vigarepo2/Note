<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#84CC16" flood-opacity="0.5"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#020617" flood-opacity="0.4"/>
    </filter>

    <filter id="shadowDeep" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#020617" flood-opacity="0.5"/>
    </filter>

    <linearGradient id="limeFilled" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#65A30D"/>
    </linearGradient>

    <linearGradient id="limeEmpty" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E293B"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <path id="wedge" 
          d="M 236.9 209.8 
             L 208.6 141.5 
             A 124 124 0 0 1 303.4 141.5 
             L 275.1 209.8 
             A 50 50 0 0 0 236.9 209.8 Z" 
          stroke="#0B1120" 
          stroke-width="6" 
          stroke-linejoin="round"/>
  </defs>

  <circle cx="256" cy="256" r="230" fill="#0B1120" filter="url(#shadowDeep)"/>

  <circle cx="256" cy="256" r="190" fill="none" stroke="#1E293B" stroke-width="16"/>

  <circle cx="256" cy="256" r="190" 
          fill="none" 
          stroke="url(#limeFilled)" 
          stroke-width="16" 
          stroke-linecap="round" 
          stroke-dasharray="1193.8" 
          stroke-dashoffset="453.6" 
          filter="url(#neonGlow)"
          transform="rotate(-90 256 256)"/>

  <circle cx="256" cy="256" r="136" fill="none" stroke="#166534" stroke-width="4"/>

  <g transform="rotate(0 256 256)">
    <use href="#wedge" transform="rotate(0 256 256)" fill="url(#limeFilled)" filter="url(#neonGlow)"/>
    <use href="#wedge" transform="rotate(45 256 256)" fill="url(#limeFilled)" filter="url(#neonGlow)"/>
    <use href="#wedge" transform="rotate(90 256 256)" fill="url(#limeFilled)" filter="url(#neonGlow)"/>
    <use href="#wedge" transform="rotate(135 256 256)" fill="url(#limeFilled)" filter="url(#neonGlow)"/>
    <use href="#wedge" transform="rotate(180 256 256)" fill="url(#limeFilled)" filter="url(#neonGlow)"/>
    
    <use href="#wedge" transform="rotate(225 256 256)" fill="url(#limeEmpty)"/>
    <use href="#wedge" transform="rotate(270 256 256)" fill="url(#limeEmpty)"/>
    <use href="#wedge" transform="rotate(315 256 256)" fill="url(#limeEmpty)"/>
  </g>

  <circle cx="256" cy="256" r="44" fill="#020617" filter="url(#shadowDeep)"/>
  
  <text x="256" y="268" 
        font-family="system-ui, -apple-system, sans-serif" 
        font-size="32" 
        font-weight="800" 
        fill="#F8FAFC" 
        text-anchor="middle" 
        letter-spacing="-1">62%</text>

  <path d="M 256 36 L 256 48 M 256 464 L 256 476 M 36 256 L 48 256 M 464 256 L 476 256" stroke="#475569" stroke-width="4" stroke-linecap="round"/>
</svg>
