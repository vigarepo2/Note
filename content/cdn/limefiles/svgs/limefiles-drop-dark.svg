<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 560" width="100%" height="100%">
  <defs>
    <filter id="shadowFloating" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="0" stdDeviation="16" flood-color="#84CC16" flood-opacity="0.15"/>
    </filter>
    <filter id="shadowButton" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="8" stdDeviation="16" flood-color="#84CC16" flood-opacity="0.4"/>
    </filter>

    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#0F172A"/>
      <stop offset="100%" stop-color="#020617"/>
    </linearGradient>
    <linearGradient id="folderBack" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#475569"/>
      <stop offset="100%" stop-color="#1E293B"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#334155"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>
    <linearGradient id="limeRind" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#4ADE80"/>
      <stop offset="50%" stop-color="#22C55E"/>
      <stop offset="100%" stop-color="#14532D"/>
    </linearGradient>
    <linearGradient id="limePulp" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#BEF264"/>
      <stop offset="100%" stop-color="#84CC16"/>
    </linearGradient>

    <path id="wedge" d="M 400 210 L 458 130 A 96 96 0 0 1 486 172 Z" fill="url(#limePulp)"/>
  </defs>

  <rect x="24" y="24" width="752" height="512" rx="32" fill="url(#bgGradient)"/>
  <rect x="24" y="24" width="752" height="512" rx="32" fill="none" stroke="#334155" stroke-width="4" stroke-dasharray="16 16" stroke-linecap="round"/>

  <path d="M 100 100 L 140 100 M 100 120 L 120 120 M 660 100 L 700 100 M 680 120 L 700 120" stroke="#1E293B" stroke-width="4" stroke-linecap="round"/>
  <circle cx="120" cy="460" r="4" fill="#334155"/>
  <circle cx="680" cy="460" r="4" fill="#334155"/>

  <g id="CenterIllustration" filter="url(#shadowFloating)">
    <path d="M 280 270 
             V 150 C 280 140 288 132 298 132 
             H 370 C 380 132 388 140 392 148 
             L 404 172 
             H 502 C 512 172 520 180 520 190 
             V 270 Z" 
          fill="url(#folderBack)"/>

    <path d="M 320 270 
             V 100 C 320 92 326 86 334 86 
             H 434 
             L 480 132 
             V 270 Z" 
          fill="#0F172A"/>
    <path d="M 434 86 V 126 C 434 130 438 134 442 134 H 480 Z" fill="#334155"/>
    
    <rect x="340" y="120" width="60" height="6" rx="3" fill="#84CC16"/>
    <rect x="340" y="140" width="110" height="6" rx="3" fill="#334155"/>
    <rect x="340" y="160" width="90" height="6" rx="3" fill="#334155"/>

    <g id="LimeCore">
      <circle cx="400" cy="210" r="110" fill="url(#limeRind)"/>
      <circle cx="400" cy="210" r="105" fill="none" stroke="#A3E635" stroke-width="2" opacity="0.8"/>
      <circle cx="400" cy="210" r="100" fill="#FFFFFF"/>
      <use href="#wedge" transform="rotate(0 400 210)"/>
      <use href="#wedge" transform="rotate(36 400 210)"/>
      <use href="#wedge" transform="rotate(72 400 210)"/>
      <use href="#wedge" transform="rotate(108 400 210)"/>
      <use href="#wedge" transform="rotate(144 400 210)"/>
      <use href="#wedge" transform="rotate(180 400 210)"/>
      <use href="#wedge" transform="rotate(216 400 210)"/>
      <use href="#wedge" transform="rotate(252 400 210)"/>
      <use href="#wedge" transform="rotate(288 400 210)"/>
      <use href="#wedge" transform="rotate(324 400 210)"/>
      <circle cx="400" cy="210" r="16" fill="#FFFFFF"/>
      <circle cx="400" cy="210" r="8" fill="#DCFCE7"/>
    </g>

    <path d="M 260 270 
             L 280 200 C 282 192 290 186 298 186 
             H 502 C 510 186 518 192 520 200 
             L 540 270 C 542 278 536 286 528 286 
             H 272 C 264 286 258 278 260 270 Z" 
          fill="url(#folderFront)"/>
          
    <circle cx="400" cy="286" r="36" fill="#84CC16" stroke="#0F172A" stroke-width="6"/>
    <path d="M 400 268 L 416 286 H 406 V 302 H 394 V 286 H 384 Z" fill="#020617" stroke="#020617" stroke-width="2" stroke-linejoin="round"/>
  </g>

  <g id="TextElements" font-family="system-ui, -apple-system, sans-serif" text-anchor="middle">
    <text x="400" y="400" font-size="28" font-weight="700" fill="#F8FAFC" letter-spacing="-0.5">Drag &amp; drop your files here</text>
    <text x="400" y="430" font-size="15" font-weight="500" fill="#94A3B8">Supports PDF, PNG, JPG, MP4, and ZIP up to 100MB</text>
  </g>

  <g id="ActionButton" transform="translate(310, 460)">
    <rect width="180" height="48" rx="24" fill="#84CC16" filter="url(#shadowButton)"/>
    <text x="90" y="29" font-family="system-ui, -apple-system, sans-serif" font-size="15" font-weight="700" fill="#064E3B" text-anchor="middle">Browse Files</text>
  </g>
</svg>
