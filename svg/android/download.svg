<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 88" width="100%" height="100%">
  <defs>
    <filter id="premium-shadow" x="-10%" y="-10%" width="120%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="16" flood-color="#000000" flood-opacity="0.12" id="shadow-color"/>
    </filter>

    <clipPath id="squircle-clip">
      <path d="M 24 0 C 4.8 0 0 4.8 0 24 C 0 43.2 4.8 48 24 48 C 43.2 48 48 43.2 48 24 C 48 4.8 43.2 0 24 0 Z" />
    </clipPath>
  </defs>

  <style>
    /* Native CSS Variables for Light Mode (Default) */
    :root {
      --bg-base: #FFFFFF;
      --bg-hover: #F9F9FB;
      --border-color: #E5E5EA;
      --text-main: #1D1D1F;
      --text-sub: #86868B;
      --icon-bg: #F5F5F7;
      --accent: #10D058; /* Sharp Malachite/Lime */
      --arrow-color: #1D1D1F;
    }

    /* Native Dark Mode Detection */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base: #1C1C1E;
        --bg-hover: #2C2C2E;
        --border-color: #38383A;
        --text-main: #F5F5F7;
        --text-sub: #A1A1A6;
        --icon-bg: #2C2C2E;
        --accent: #15E866;
        --arrow-color: #F5F5F7;
      }
      #shadow-color {
        flood-opacity: 0.5;
        flood-color: #000000;
      }
    }

    /* Core Physics */
    .button-container {
      transform-origin: 160px 44px;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.4, 1);
      cursor: pointer;
    }
    
    .base-shape {
      fill: var(--bg-base);
      stroke: var(--border-color);
      stroke-width: 1.5;
      transition: fill 0.3s ease, stroke 0.3s ease;
    }

    .button-container:hover {
      transform: scale(1.015) translateY(-2px);
    }
    
    .button-container:active {
      transform: scale(0.97);
    }

    .button-container:hover .base-shape {
      fill: var(--bg-hover);
      stroke: var(--accent);
    }

    /* Icon Animations */
    .icon-surface {
      fill: var(--icon-bg);
      transition: fill 0.4s ease;
    }
    .button-container:hover .icon-surface {
      fill: var(--accent);
    }

    .android-vector {
      fill: var(--text-main);
      transition: fill 0.4s ease, transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
      transform-origin: 24px 24px;
    }
    .button-container:hover .android-vector {
      fill: #111111; /* Punches out the accent color */
      transform: scale(1.08);
    }

    /* Typography */
    .font-sub {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      fill: var(--text-sub);
      text-transform: uppercase;
      transition: fill 0.3s ease;
    }
    .button-container:hover .font-sub {
      fill: var(--text-main);
    }

    .font-main {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.02em;
      fill: var(--text-main);
    }

    /* Dynamic Arrow */
    .arrow {
      stroke: var(--arrow-color);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.4, 1);
    }
    .arrow-line {
      stroke: var(--arrow-color);
      stroke-width: 2.5;
      stroke-linecap: round;
      transition: all 0.4s cubic-bezier(0.25, 1, 0.4, 1);
      opacity: 0.3;
    }

    .button-container:hover .arrow {
      transform: translateY(4px);
      stroke: var(--accent);
    }
    .button-container:hover .arrow-line {
      stroke: var(--accent);
      opacity: 1;
      transform: scaleX(1.4);
      transform-origin: center;
    }
  </style>

  <g class="button-container">
    
    <rect x="10" y="10" width="300" height="68" rx="34" class="base-shape" filter="url(#premium-shadow)"/>

    <g transform="translate(20, 20)">
      <rect width="48" height="48" class="icon-surface" clip-path="url(#squircle-clip)"/>
      
      <path class="android-vector" d="M31.2 20.3l1.8-3.1c.2-.3.1-.7-.2-.9-.3-.2-.7-.1-.9.2L30 19.7c-1.7-.8-3.6-1.2-5.7-1.2-2 0-3.9.4-5.6 1.2l-1.9-3.2c-.2-.3-.6-.4-.9-.2-.3.2-.4.6-.2.9l1.8 3.1C13.8 22.4 11 26 11 30.5h26.6c0-4.5-2.8-8.1-6.4-10.2zM17 26.5c-.7 0-1.2-.6-1.2-1.2 0-.7.6-1.2 1.2-1.2.7 0 1.2.6 1.2 1.2 0 .7-.6 1.2-1.2 1.2zm14.6 0c-.7 0-1.2-.6-1.2-1.2 0-.7.6-1.2 1.2-1.2.7 0 1.2.6 1.2 1.2 0 .7-.6 1.2-1.2 1.2z"/>
    </g>

    <text x="86" y="38" class="font-sub">Official Package</text>
    <text x="85" y="60" class="font-main">Download APK</text>

    <g transform="translate(270, 44)">
      <line x1="-8" y1="12" x2="8" y2="12" class="arrow-line"/>
      <path d="M0 -12 L0 6 M-6 0 L0 6 L6 0" class="arrow"/>
    </g>

  </g>
</svg>
