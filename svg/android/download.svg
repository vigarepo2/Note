<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="100%" height="100%">
  <defs>
    <filter id="ambient-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="14" stdDeviation="18" flood-color="#000000" flood-opacity="0.15" id="shadow-base"/>
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#000000" flood-opacity="0.08" id="shadow-core"/>
    </filter>

    <filter id="icon-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00E676" flood-opacity="0.4"/>
    </filter>
  </defs>

  <style>
    /* Theme Variables */
    :root {
      --bg-base: #FFFFFF;
      --bg-glow: rgba(0, 230, 118, 0.03);
      --border: rgba(0, 0, 0, 0.06);
      --text-main: #1D1D1F;
      --text-sub: #86868B;
      --icon-grad-1: #00E676;
      --icon-grad-2: #00B259;
      --arrow: #1D1D1F;
      --arrow-bg: #F5F5F7;
    }

    /* Auto Dark Mode Integration */
    @media (prefers-color-scheme: dark) {
      :root {
        --bg-base: #1C1C1E;
        --bg-glow: rgba(0, 230, 118, 0.08);
        --border: rgba(255, 255, 255, 0.1);
        --text-main: #F5F5F7;
        --text-sub: #A1A1A6;
        --arrow: #F5F5F7;
        --arrow-bg: rgba(255, 255, 255, 0.08);
      }
      #shadow-base { flood-opacity: 0.5; }
      #shadow-core { flood-opacity: 0.4; }
    }

    /* 1. Global Tap Physics */
    .btn-chassis {
      transform-origin: 170px 50px;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.4, 1), fill 0.4s ease;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent; /* Removes default Android blue flash */
    }
    
    /* The Hover Lift */
    .btn-chassis:hover {
      transform: scale(1.02) translateY(-2px);
    }
    
    /* The Tap/Squish (Active State) */
    .btn-chassis:active {
      transform: scale(0.96) translateY(2px);
      transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1); /* Instant snap on tap */
    }

    /* 2. Background Reactions */
    .base-plate {
      fill: var(--bg-base);
      stroke: var(--border);
      stroke-width: 1;
      transition: all 0.4s ease;
    }
    .btn-chassis:hover .base-plate {
      fill: var(--bg-glow);
      stroke: var(--icon-grad-1);
    }

    /* 3. Icon Block Interactions */
    .icon-block {
      transform-origin: 52px 50px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    /* Icon scales up on hover */
    .btn-chassis:hover .icon-block {
      transform: scale(1.08);
    }
    /* Icon physically tilts backward on tap */
    .btn-chassis:active .icon-block {
      transform: scale(0.95) rotate(-6deg);
      transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }

    /* 4. Typography Fluidity */
    .text-top {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      fill: var(--text-sub);
      transition: fill 0.3s ease;
    }
    .btn-chassis:hover .text-top {
      fill: var(--icon-grad-1);
    }

    .text-bottom {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", sans-serif;
      font-size: 19px;
      font-weight: 600;
      letter-spacing: -0.02em;
      fill: var(--text-main);
    }

    /* 5. Download Arrow Physics */
    .arrow-container {
      fill: var(--arrow-bg);
      transition: all 0.4s ease;
    }
    .arrow-icon {
      stroke: var(--arrow);
      stroke-width: 2.5;
      stroke-linecap: round;
      stroke-linejoin: round;
      fill: none;
      transform-origin: 280px 50px;
      transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    
    /* Arrow drops down and turns green on hover */
    .btn-chassis:hover .arrow-container {
      fill: rgba(0, 230, 118, 0.15);
    }
    .btn-chassis:hover .arrow-icon {
      transform: translateY(4px);
      stroke: var(--icon-grad-1);
    }
    /* Arrow sharply shoots down on tap */
    .btn-chassis:active .arrow-icon {
      transform: translateY(8px) scale(0.9);
      transition: transform 0.1s cubic-bezier(0.4, 0, 0.2, 1);
    }
  </style>

  <g class="btn-chassis">
    
    <rect x="20" y="14" width="300" height="72" rx="36" class="base-plate" filter="url(#ambient-shadow)"/>

    <g class="icon-block">
      <rect x="30" y="24" width="52" height="52" rx="20" fill="var(--icon-grad-2)" filter="url(#icon-shadow)"/>
      <rect x="30" y="24" width="52" height="52" rx="20" fill="var(--icon-grad-1)"/>
      
      <path d="M 30 44 L 30 38 C 30 28 38 24 48 24 L 64 24 C 74 24 82 28 82 38 L 82 44 Z" fill="rgba(255,255,255,0.2)"/>

      <path fill="#ffffff" d="M63.5 39.2l1.7-3c.2-.3.1-.6-.2-.8-.3-.2-.6-.1-.8.2l-1.8 3.1c-1.3-.6-2.8-.9-4.5-.9s-3.2.3-4.5.9l-1.8-3.1c-.2-.3-.5-.4-.8-.2-.3.2-.4.5-.2.8l1.7 3C49.3 41 47.2 44 47 47.7h22c-.2-3.7-2.3-6.7-5.5-8.5zM53.2 44.8c-.6 0-1.1-.5-1.1-1.1s.5-1.1 1.1-1.1 1.1.5 1.1 1.1-.5 1.1-1.1 1.1zm9.5 0c-.6 0-1.1-.5-1.1-1.1s.5-1.1 1.1-1.1 1.1.5 1.1 1.1-.5 1.1-1.1 1.1z"/>
    </g>

    <text x="100" y="42" class="text-top">System Package</text>
    <text x="98" y="66" class="text-bottom">Download APK</text>

    <g>
      <circle cx="280" cy="50" r="20" class="arrow-container"/>
      
      <path d="M280 43 L280 57 M274 51 L280 57 L286 51" class="arrow-icon"/>
    </g>

  </g>
</svg>
