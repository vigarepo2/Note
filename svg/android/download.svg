<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 460 140" width="100%" height="100%">
  <defs>
    <filter id="chassis-shadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="18" stdDeviation="24" flood-color="#000000" flood-opacity="0.6"/>
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#CCFF00" flood-opacity="0.05" id="lime-ambient"/>
    </filter>

    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur1"/>
      <feGaussianBlur stdDeviation="16" result="blur2"/>
      <feMerge>
        <feMergeNode in="blur2"/>
        <feMergeNode in="blur1"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <pattern id="tech-grid" width="12" height="12" patternUnits="userSpaceOnUse">
      <path d="M 12 0 L 0 0 0 12" fill="none" stroke="rgba(255,255,255,0.03)" stroke-width="1"/>
    </pattern>

    <linearGradient id="metal-base" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#23252A"/>
      <stop offset="100%" stop-color="#141518"/>
    </linearGradient>

    <linearGradient id="metal-inset" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#141518"/>
      <stop offset="100%" stop-color="#23252A"/>
    </linearGradient>
    
    <clipPath id="chassis-clip">
      <rect x="30" y="30" width="400" height="80" rx="24"/>
    </clipPath>
  </defs>

  <style>
    /* Global Hardware Physics */
    .mech-btn {
      cursor: pointer;
      transform-origin: 230px 70px;
      transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
      -webkit-tap-highlight-color: transparent;
    }
    .mech-btn:hover { transform: scale(1.02); }
    .mech-btn:active { transform: scale(0.97); transition: transform 0.1s ease-out; }

    /* Surface Reactions */
    .chassis-stroke {
      stroke: rgba(255,255,255,0.08);
      transition: stroke 0.4s ease, stroke-width 0.4s ease;
    }
    .mech-btn:hover .chassis-stroke {
      stroke: #CCFF00;
      stroke-width: 2px;
      stroke-opacity: 0.8;
    }

    /* The "Hold to Download" Progress Bar Logic */
    .progress-fill {
      width: 0;
      opacity: 0;
      transition: width 0.2s ease, opacity 0.2s ease;
    }
    /* When user taps and holds, the bar shoots across */
    .mech-btn:active .progress-fill {
      width: 400px;
      opacity: 1;
      transition: width 1.2s cubic-bezier(0.2, 0.8, 0.2, 1), opacity 0.1s ease;
    }

    /* Dynamic Text Swapping */
    .text-idle { transition: opacity 0.2s ease, transform 0.2s ease; }
    .text-action { opacity: 0; transform: translateY(10px); transition: opacity 0.2s ease, transform 0.2s ease; }
    
    .mech-btn:active .text-idle { opacity: 0; transform: translateY(-10px); }
    .mech-btn:active .text-action { opacity: 1; transform: translateY(0); fill: #141518; }
    .mech-btn:active .text-micro { fill: rgba(20, 21, 24, 0.6); }

    /* Holographic Icon Glitch Effect */
    .icon-base { transition: all 0.3s ease; }
    .icon-glitch-1 { opacity: 0; fill: #00F0FF; transition: all 0.3s ease; }
    .icon-glitch-2 { opacity: 0; fill: #CCFF00; transition: all 0.3s ease; }

    .mech-btn:hover .icon-glitch-1 { opacity: 0.6; transform: translate(-3px, -2px); }
    .mech-btn:hover .icon-glitch-2 { opacity: 0.6; transform: translate(3px, 2px); }
    .mech-btn:active .icon-base { fill: #141518; }
    .mech-btn:active .icon-glitch-1 { opacity: 0; }
    .mech-btn:active .icon-glitch-2 { opacity: 0; }

    /* Action Arrow Sequence */
    .chevron {
      fill: none;
      stroke: #868C98;
      stroke-width: 3;
      stroke-linecap: square;
      transition: all 0.3s ease;
    }
    .mech-btn:hover .c1 { stroke: #CCFF00; transform: translateX(4px); opacity: 1; }
    .mech-btn:hover .c2 { stroke: #CCFF00; transform: translateX(8px); opacity: 0.5; }
    .mech-btn:hover .c3 { stroke: #CCFF00; transform: translateX(12px); opacity: 0.2; }
    
    /* Active State Arrow Override */
    .mech-btn:active .chevron { stroke: #141518; }

    /* Typography Defaults */
    .font-micro {
      font-family: ui-monospace, "SF Mono", "Cascadia Code", "Roboto Mono", monospace;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.3em;
      fill: #868C98;
      transition: fill 0.2s;
    }
    .font-main {
      font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI", sans-serif;
      font-size: 22px;
      font-weight: 800;
      letter-spacing: -0.03em;
      fill: #FFFFFF;
      text-transform: uppercase;
    }
  </style>

  <g class="mech-btn">
    
    <rect x="30" y="30" width="400" height="80" rx="24" fill="url(#metal-base)" filter="url(#chassis-shadow)"/>
    
    <rect x="30" y="30" width="400" height="80" rx="24" fill="url(#tech-grid)" clip-path="url(#chassis-clip)"/>

    <rect x="30" y="30" width="0" height="80" rx="24" fill="#CCFF00" class="progress-fill"/>

    <rect x="31" y="31" width="398" height="78" rx="23" fill="none" class="chassis-stroke"/>

    <g transform="translate(42, 42)">
      <rect x="0" y="0" width="56" height="56" rx="16" fill="url(#metal-inset)" stroke="rgba(0,0,0,0.5)" stroke-width="2"/>
      
      <path class="icon-glitch-1" d="M36.4 20.8l1.9-3.3c.2-.3.1-.7-.2-.9-.3-.2-.7-.1-.9.2L35.2 20c-1.9-.9-4-1.3-6.2-1.3-2.3 0-4.3.5-6.2 1.3l-2-3.4c-.2-.3-.6-.4-.9-.2-.3.2-.4.6-.2.9l1.9 3.3C17.3 23.2 14.2 27.2 14 32h30c-.2-4.8-3.3-8.8-7.6-11.2zM21 26c-.8 0-1.5-.7-1.5-1.5S20.2 23 21 23s1.5.7 1.5 1.5S21.8 26 21 26zm16 0c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5z"/>
      
      <path class="icon-glitch-2" d="M36.4 20.8l1.9-3.3c.2-.3.1-.7-.2-.9-.3-.2-.7-.1-.9.2L35.2 20c-1.9-.9-4-1.3-6.2-1.3-2.3 0-4.3.5-6.2 1.3l-2-3.4c-.2-.3-.6-.4-.9-.2-.3.2-.4.6-.2.9l1.9 3.3C17.3 23.2 14.2 27.2 14 32h30c-.2-4.8-3.3-8.8-7.6-11.2zM21 26c-.8 0-1.5-.7-1.5-1.5S20.2 23 21 23s1.5.7 1.5 1.5S21.8 26 21 26zm16 0c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5z"/>
      
      <path class="icon-base" fill="#FFFFFF" d="M36.4 20.8l1.9-3.3c.2-.3.1-.7-.2-.9-.3-.2-.7-.1-.9.2L35.2 20c-1.9-.9-4-1.3-6.2-1.3-2.3 0-4.3.5-6.2 1.3l-2-3.4c-.2-.3-.6-.4-.9-.2-.3.2-.4.6-.2.9l1.9 3.3C17.3 23.2 14.2 27.2 14 32h30c-.2-4.8-3.3-8.8-7.6-11.2zM21 26c-.8 0-1.5-.7-1.5-1.5S20.2 23 21 23s1.5.7 1.5 1.5S21.8 26 21 26zm16 0c-.8 0-1.5-.7-1.5-1.5s.7-1.5 1.5-1.5 1.5.7 1.5 1.5-.7 1.5-1.5 1.5z"/>
      
      <rect x="2" y="2" width="52" height="26" rx="14" fill="rgba(255,255,255,0.03)"/>
    </g>

    <text x="120" y="56" class="font-micro text-micro">SECURE PROTOCOL / ANDROID</text>

    <text x="118" y="85" class="font-main text-idle">Download APK</text>
    
    <text x="118" y="85" class="font-main text-action">Initializing...</text>

    <g transform="translate(360, 70)">
      <path class="chevron c3" d="M -12 -10 L -2 0 L -12 10" opacity="0"/>
      <path class="chevron c2" d="M -4 -10 L 6 0 L -4 10" opacity="0"/>
      <path class="chevron c1" d="M 4 -10 L 14 0 L 4 10"/>
      
      <path d="M 24 -14 L 30 -14 L 30 14 L 24 14" fill="none" stroke="rgba(255,255,255,0.2)" stroke-width="2"/>
    </g>

  </g>
</svg>
