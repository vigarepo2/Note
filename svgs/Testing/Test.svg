<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="100%" height="100%">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#2a2a2d"/>
      <stop offset="100%" stop-color="#1c1c1e"/>
    </linearGradient>

    <linearGradient id="glass-edge" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#ffffff" stop-opacity="0.15"/>
      <stop offset="100%" stop-color="#ffffff" stop-opacity="0.01"/>
    </linearGradient>

    <linearGradient id="icon-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#00E676"/>
      <stop offset="100%" stop-color="#00B259"/>
    </linearGradient>

    <filter id="drop-shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="12" stdDeviation="12" flood-color="#000000" flood-opacity="0.4"/>
    </filter>

    <filter id="icon-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="6" stdDeviation="8" flood-color="#00E676" flood-opacity="0.35"/>
    </filter>

    <filter id="inner-shadow">
      <feOffset dx="0" dy="2"/>
      <feGaussianBlur stdDeviation="2" result="offset-blur"/>
      <feComposite operator="out" in="SourceGraphic" in2="offset-blur" result="inverse"/>
      <feFlood flood-color="white" flood-opacity="0.4" result="color"/>
      <feComposite operator="in" in="color" in2="inverse" result="shadow"/>
      <feComposite operator="over" in="shadow" in2="SourceGraphic"/>
    </filter>
  </defs>

  <style>
    /* Embedded Physics and Animations */
    .btn-group {
      transform-origin: 170px 50px;
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
      cursor: pointer;
    }
    .btn-group:hover {
      transform: scale(1.02) translateY(-2px);
    }
    .btn-group:active {
      transform: scale(0.97);
    }
    
    .icon-box {
      transform-origin: 52px 50px;
      transition: transform 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
    }
    .btn-group:hover .icon-box {
      transform: scale(1.06);
    }

    .arrow-icon {
      transition: transform 0.4s cubic-bezier(0.25, 1, 0.5, 1);
    }
    .btn-group:hover .arrow-icon {
      transform: translateY(3px);
    }

    .arrow-bg {
      transition: fill 0.3s ease;
    }
    .btn-group:hover .arrow-bg {
      fill: rgba(255, 255, 255, 0.15);
    }

    /* System Typography */
    .text-eyebrow {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      fill: #8E8E93;
      transition: fill 0.3s ease;
    }
    .btn-group:hover .text-eyebrow {
      fill: #00E676;
    }

    .text-main {
      font-family: -apple-system, BlinkMacSystemFont, "SF Pro Display", "Segoe UI", Roboto, Helvetica, sans-serif;
      font-size: 18px;
      font-weight: 600;
      letter-spacing: -0.3px;
      fill: #FFFFFF;
    }
  </style>

  <g class="btn-group">
    
    <rect x="20" y="15" width="300" height="70" rx="35" fill="url(#bg-grad)" filter="url(#drop-shadow)"/>
    
    <rect x="20.5" y="15.5" width="299" height="69" rx="34.5" fill="none" stroke="#ffffff" stroke-opacity="0.08" stroke-width="1"/>
    
    <rect x="21" y="16" width="298" height="34" rx="33" fill="url(#glass-edge)"/>

    <g class="icon-box">
      <rect x="28" y="23" width="54" height="54" rx="20" fill="url(#icon-grad)" filter="url(#icon-glow)"/>
      <rect x="28" y="23" width="54" height="54" rx="20" fill="url(#icon-grad)" filter="url(#inner-shadow)"/>
      
      <g transform="translate(43, 38)">
        <path fill="#ffffff" d="M17.523 9.208l1.745-3.023c.155-.268.064-.613-.203-.768-.268-.155-.613-.064-.768.203L16.48 8.76C15.19 8.196 13.655 7.85 12 7.85c-1.656 0-3.19.346-4.48.91L5.703 5.62c-.155-.267-.5-.358-.768-.203-.268.155-.358.5-.203.768l1.745 3.023C3.308 10.985 1.154 13.987 1 17.65h22c-.154-3.663-2.308-6.665-5.477-8.442zM7.25 14.85c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25zm9.5 0c-.69 0-1.25-.56-1.25-1.25s.56-1.25 1.25-1.25 1.25.56 1.25 1.25-.56 1.25-1.25 1.25z"/>
      </g>
    </g>

    <text x="100" y="42" class="text-eyebrow">Get for Android</text>
    <text x="100" y="65" class="text-main">Download APK</text>

    <circle cx="282" cy="50" r="18" fill="rgba(255, 255, 255, 0.05)" class="arrow-bg"/>
    <g transform="translate(270, 38)" class="arrow-icon">
      <path fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
    </g>
    
  </g>
</svg>
